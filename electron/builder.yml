appId: com.educonecta.${env.ROLE}
productName: EduConecta ${env.ROLE}
directories:
  output: public/installers
  buildResources: electron
files:
  - electron/**/*
  - package.json
  - .next/**/*
  - public/**/*
  - node_modules/**/*
win:
  target:
    - nsis
  artifactName: educonecta-${env.ROLE}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  artifactName: educonecta-${env.ROLE}.${ext}
linux:
  target:
    - AppImage
  artifactName: educonecta-${env.ROLE}.${ext}
