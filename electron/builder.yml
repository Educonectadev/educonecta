appId: com.educonecta.app
productName: EduConecta
directories:
  output: public/installers
  buildResources: electron
files:
  - electron/**/*
  - package.json
  - .next/**/*
  - "!.next/dev/**"
  - public/**/*
  - "!public/installers/**"
win:
  target:
    - nsis
  artifactName: educonecta-${env.ROLE}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  artifactName: educonecta-${env.ROLE}.${ext}
linux:
  target:
    - AppImage
    - deb
  artifactName: educonecta-${env.ROLE}.${ext}
  category: Education
